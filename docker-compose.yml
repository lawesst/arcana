services:
  postgres:
    image: postgres:16-alpine
    container_name: arcana-postgres
    environment:
      POSTGRES_USER: arcana
      POSTGRES_PASSWORD: arcana_dev
      POSTGRES_DB: arcana
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arcana-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
