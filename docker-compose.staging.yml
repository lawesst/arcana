x-arcana-env: &arcana-env
  ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL}
  ARBITRUM_CHAIN_ID: ${ARBITRUM_CHAIN_ID:-42161}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  API_PORT: ${API_PORT:-3001}
  API_HOST: ${API_HOST:-0.0.0.0}
  COLLECTOR_POLL_INTERVAL_MS: ${COLLECTOR_POLL_INTERVAL_MS:-1000}
  COLLECTOR_BATCH_SIZE: ${COLLECTOR_BATCH_SIZE:-100}
  NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arcana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arcana_dev}
      POSTGRES_DB: ${POSTGRES_DB:-arcana}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcana} -d ${POSTGRES_DB:-arcana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    environment:
      <<: *arcana-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["pnpm", "db:migrate"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      <<: *arcana-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PUBLIC_PORT:-3001}:${API_PORT:-3001}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_PORT:-3001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: Dockerfile
      target: collector
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      <<: *arcana-env
    depends_on:
      migrate:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
