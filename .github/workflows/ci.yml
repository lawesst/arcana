name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arcana
          POSTGRES_PASSWORD: arcana_dev
          POSTGRES_DB: arcana
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arcana -d arcana"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      ARBITRUM_RPC_URL: https://arb1.arbitrum.io/rpc
      ARBITRUM_CHAIN_ID: 42161
      DATABASE_URL: postgresql://arcana:arcana_dev@127.0.0.1:5432/arcana
      REDIS_URL: redis://127.0.0.1:6379
      API_PORT: 3001
      API_HOST: 127.0.0.1
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:3001
      COLLECTOR_POLL_INTERVAL_MS: 1000
      COLLECTOR_BATCH_SIZE: 100

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke suite
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
